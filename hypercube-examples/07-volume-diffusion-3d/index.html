<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Hypercube V4 - 3D Volume Diffusion</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>
    <div id="app">
        <div class="ui">
            <h1>🌊 Hypercube 3D Diffusion</h1>
            <p>Grille 64x64x64 (262k voxels)</p>
            <div class="controls">
                <button id="btnSlice">Vue Tranche (Z=32)</button>
                <button id="btnIso">Vue Isométrique</button>
                <button id="btnGPU">GPU: OFF</button>
                <button id="btnReset">Reset Blob</button>
                <div class="param">
                    <label>Diffusion:</label>
                    <input type="range" id="rangeDiff" min="0.01" max="0.16" step="0.01" value="0.1">
                </div>
            </div>
            <div class="stats">
                <span id="fps">FPS: 0</span> |
                <span id="computeTime">Compute: 0ms</span>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
