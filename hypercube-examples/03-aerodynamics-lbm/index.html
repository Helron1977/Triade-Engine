<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypercube - Aerodynamics LBM (O1)</title>
    <style>
        body {
            margin: 0;
            background: #050507;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            background: #000;
            border: 1px solid #222;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            cursor: crosshair;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: auto;
        }

        .stats {
            font-family: monospace;
            color: #0f0;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .controls {
            font-size: 12px;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 10px;
            margin-top: 10px;
        }

        h1 {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-weight: 100;
            letter-spacing: 8px;
            opacity: 0.2;
        }

        b {
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="ui">
        <div id="stats" class="stats">Loading LBM Engine...</div>
        <div id="drag" class="stats">Drag Score: 0</div>
        <div class="controls">
            <b>Mouse Drag:</b> Draw Obstacles<br>
            <b>Shift + Click:</b> Clear Grid<br>
            <b>Mode:</b> LBM D2Q9 (O1 Multithread)
        </div>
    </div>
    <canvas id="canvas"></canvas>
    <h1>AERODYNAMICS</h1>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
