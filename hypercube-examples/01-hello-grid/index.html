<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypercube - Hello Grid (GOL)</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            border: 1px solid #333;
        }

        h1 {
            position: absolute;
            bottom: 20px;
            font-weight: 200;
            letter-spacing: 2px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="stats" id="stats">Initializing Hypercube...</div>
    <canvas id="canvas"></canvas>
    <h1>01. HELLO GRID (GAME OF LIFE)</h1>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
