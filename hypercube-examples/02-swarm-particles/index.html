<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypercube - Swarm Particles (O1)</title>
    <style>
        body {
            margin: 0;
            background: #08080a;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: #000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            cursor: crosshair;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            border: 1px solid #444;
            color: #0f0;
        }

        h1 {
            position: absolute;
            bottom: 30px;
            font-weight: 200;
            letter-spacing: 4px;
            opacity: 0.3;
            text-transform: uppercase;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="stats" id="stats">10,000 Agents • Calculating...</div>
    <div class="controls">Click anywhere to set target</div>
    <canvas id="canvas"></canvas>
    <h1>02. Swarm Intelligence</h1>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
