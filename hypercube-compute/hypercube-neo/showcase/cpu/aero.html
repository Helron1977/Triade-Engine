<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Aero | CPU High Fidelity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 100;
        }

        .hud-item {
            margin-bottom: 10px;
        }

        .hud-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
        }

        .hud-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: #00f2ff;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .control-btn:hover {
            opacity: 1;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.5;
            transition: opacity 0.2s;
            z-index: 100;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <a href="./index.html" class="back-link">← HUB</a>

    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Engine</div>
            <div class="hud-value">Neo Aero (CPU)</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Performance</div>
            <div id="fps-counter" class="hud-value">Measuring...</div>
        </div>
    </div>

    <div id="canvas-container">
        <!-- Canvas will be injected by the orchestrator -->
    </div>

    <div id="controls">
        <button class="control-btn" onclick="window.location.reload()">Reset</button>
        <span style="color: rgba(255,255,255,0.2)">|</span>
        <button class="control-btn">Pause</button>
    </div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
