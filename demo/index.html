<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triade Engine Demo</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            border: 1px solid #222;
            image-rendering: pixelated;
            width: 512px;
            height: 512px;
            background: #111;
        }

        .header {
            margin-bottom: 25px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #00ff88;
            letter-spacing: -0.5px;
            font-weight: 600;
        }

        p {
            margin: 8px 0 0;
            color: #888;
            font-size: 15px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="tag">Zero-Allocation Compute</div>
        <h1>🌊 Triade GodMode O(1)</h1>
        <p>Game Of Life Engine - Raw Float32Array Rendered via Canvas 2D<br /><b>Click & Drag</b> on the grid to spawn
            life.</p>
    </div>
    <canvas id="triade-canvas" width="256" height="256"></canvas>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
